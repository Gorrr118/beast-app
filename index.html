<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Beast Omni Ultimate</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;900&display=swap" rel="stylesheet">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            background-color: #0d1117;
            color: #e6edf3;
            font-family: 'Poppins', -apple-system, system-ui, sans-serif;
            margin: 0; padding: 0;
            overflow-x: hidden;
            -webkit-user-select: none;
        }

        /* LANG SELECT */
        .lang-container {
            position: absolute; top: 25px; right: 20px; z-index: 100;
        }
        
        #lang-select {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(20px);
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 10px 16px;
            border-radius: 16px;
            font-size: 14px; font-weight: 700;
            outline: none;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }

        .video-banner {
            position: relative; width: 100%; height: 45vh; background: #000; overflow: hidden;
        }

        .video-banner video {
            width: 100%; height: 100%; object-fit: cover; opacity: 0.7;
        }

        .video-banner::after {
            content: ''; position: absolute; bottom: 0; left: 0; width: 100%; height: 40%;
            background: linear-gradient(to top, #0d1117, transparent); z-index: 1;
        }

        .video-overlay {
            position: absolute; bottom: 65px; left: 25px; color: white; z-index: 2;
        }

        .video-overlay h1 {
            margin: 0; font-size: 42px; font-weight: 950; text-transform: uppercase;
            letter-spacing: -1px; line-height: 1; text-shadow: 0 0 20px rgba(37, 99, 235, 0.6);
        }

        .main-content {
            position: relative;
            background: rgba(255, 255, 255, 0.03); 
            backdrop-filter: blur(15px);
            border-radius: 40px 40px 0 0;
            padding: 30px 25px; margin-top: -50px;
            box-sizing: border-box; min-height: 55vh;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 0 -20px 40px rgba(0,0,0,0.4);
            z-index: 5;
        }

        .status-card {
            background: rgba(255, 255, 255, 0.05);
            padding: 24px; border-radius: 30px;
            margin-bottom: 25px; display: flex;
            justify-content: space-between; align-items: center;
            border: 1px solid rgba(37, 99, 235, 0.2);
        }

        .status-value { font-size: 28px; font-weight: 900; color: #fff; }
        .status-value span { color: #3b82f6; text-shadow: 0 0 10px rgba(59, 130, 246, 0.5); }

        #plan-badge {
            background: linear-gradient(135deg, #2563eb, #1d4ed8);
            color: white; padding: 12px 20px; border-radius: 18px;
            font-size: 14px; font-weight: 900; text-transform: uppercase;
        }

        .btn-action {
            background: linear-gradient(135deg, #2563eb 0%, #1d4ed8 100%);
            color: white; border: none; width: 100%; padding: 24px;
            border-radius: 26px; font-size: 19px; font-weight: 800;
            margin-bottom: 25px;
            box-shadow: 0 15px 35px rgba(37, 99, 235, 0.35), inset 0 2px 4px rgba(255,255,255,0.3);
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            cursor: pointer;
        }
        .btn-action:active { transform: scale(0.96); box-shadow: 0 5px 15px rgba(37, 99, 235, 0.2); }

        .menu-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; padding-bottom: 30px; }

        .menu-item {
            background: rgba(255, 255, 255, 0.05);
            padding: 24px 15px; border-radius: 28px;
            text-align: center; font-weight: 700; font-size: 15px;
            color: #e6edf3; border: 1px solid rgba(255, 255, 255, 0.05);
            transition: all 0.2s ease;
        }
        .menu-item:active { background: rgba(37, 99, 235, 0.15); transform: translateY(2px); border-color: #2563eb; }

        .item-gift {
            grid-column: span 2; background: rgba(37, 99, 235, 0.1);
            border: 2px solid #2563eb; color: #3b82f6; font-weight: 800;
        }

        #gift-modal {
            display: none; position: fixed; top: 0; left: 0;
            width: 100%; height: 100%; background: #0d1117;
            z-index: 9000; flex-direction: column;
            align-items: center; justify-content: center; padding: 20px;
            box-sizing: border-box;
        }

        .wheel-container { 
            position: relative; width: 320px; height: 320px; 
            margin: 30px auto; display: flex; justify-content: center; align-items: center; 
        }
        #wheel-canvas { width: 100%; height: 100%; transition: transform 4s cubic-bezier(0.1, 0, 0, 1); }
        .wheel-pointer { 
            position: absolute; top: -20px; left: 50%; transform: translateX(-50%); 
            width: 0; height: 0; border-left: 15px solid transparent; 
            border-right: 15px solid transparent; border-top: 30px solid #ef4444; z-index: 10; 
        }
    </style>
</head>
<body>

    <div class="lang-container">
        <select id="lang-select" onchange="changeLanguage(this.value)">
            <option value="ru" selected>🇷🇺 RU</option>
            <option value="en">🇺🇸 EN</option>
            <option value="am">🇦🇲 AM</option>
            <option value="es">🇪🇸 ES</option>
            <option value="fr">🇫🇷 FR</option>
            <option value="de">🇩🇪 DE</option>
            <option value="it">🇮🇹 IT</option>
            <option value="pt">🇵🇹 PT</option>
            <option value="tr">🇹🇷 TR</option>
            <option value="ar">🇸🇦 AR</option>
            <option value="zh">🇨🇳 ZH</option>
            <option value="ja">🇯🇵 JA</option>
        </select>
    </div>

    <div class="video-banner">
        <video autoplay muted loop playsinline><source src="https://www.w3schools.com/howto/rain.mp4" type="video/mp4"></video>
        <div class="video-overlay">
            <h1 id="user-name">BEAST</h1>
            <div id="sub-title" style="font-size: 16px; opacity: 0.8; font-weight: 600;">Beast Omni Global</div>
        </div>
    </div>

    <div class="main-content">
        <div class="status-card">
            <div class="status-info">
                <div id="label-status">Лимит видео</div>
                <div class="status-value"><span id="limit-val">0.5</span> <small id="unit-text">мин.</small></div>
            </div>
            <div id="plan-badge">FREE</div>
        </div>

        <button id="btn-try" class="btn-action" onclick="tg.showAlert('Generating...')">СОЗДАТЬ ВИДЕО</button>

        <div class="menu-grid">
            <div id="item-stats" class="menu-item" onclick="tg.showAlert('Stats loading...')">📊 Статистика</div>
            <div id="item-ref" class="menu-item" onclick="tg.showAlert('Referrals empty')">👥 Рефералы</div>
            <div id="item-tariffs" class="menu-item" onclick="tg.showAlert('Tariffs list...')">💎 Тарифы</div>
            <div id="item-help" class="menu-item" onclick="tg.showAlert('Support 24/7')">🆘 Помощь</div>
            <div id="item-gift" class="menu-item item-gift" onclick="openGiftModal()">🎁 Ежедневный подарок</div>
            <div id="item-profile" class="menu-item" onclick="tg.showAlert('Profile loading...')">👤 Кабинет</div>
            <div id="item-showcase" class="menu-item" onclick="tg.showAlert('Opening Showcase')">🎬 Примеры</div>
        </div>
    </div>

    <div id="gift-modal">
        <h2 id="g-title" style="font-size: 32px; font-weight: 950; color:#fff; margin:0; text-align:center;">Beast Luck</h2>
        <p id="timer-info" style="color:#8b949e; font-weight:600; margin-bottom:10px;">Крути и выигрывай!</p>
        <div class="wheel-container">
            <div class="wheel-pointer"></div>
            <canvas id="wheel-canvas" width="600" height="600"></canvas>
        </div>
        <button id="spin-button" class="btn-action" style="max-width:300px;" onclick="runWheel()">КРУТИТЬ</button>
        <div id="btn-back" style="margin-top:20px; color:#3b82f6; font-weight:800; cursor:pointer;" onclick="closeGiftModal()">← НАЗАД</div>
    </div>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand();

        let userPlan = {
            balance: 0.5,
            updateDisplay: function() {
                document.getElementById('limit-val').innerText = this.balance.toFixed(1);
            }
        };

        const prizes = [
            { n: "0.1", c: "#121212", v: 0.1 }, { n: "0.5", c: "#3b82f6", v: 0.5 },
            { n: "0.1", c: "#1a1a1a", v: 0.1 }, { n: "1.0", c: "#2563eb", v: 1.0 },
            { n: "0.1", c: "#121212", v: 0.1 }, { n: "2.0", c: "#1e40af", v: 2.0 },
            { n: "0.1", c: "#1a1a1a", v: 0.1 }, { n: "0.0", c: "#4b5563", v: 0 }
        ];

        const i18n = {
            ru: { limit: "Лимит видео", unit: "мин.", try: "СОЗДАТЬ ВИДЕО", stats: "📊 Статистика", ref: "👥 Рефералы", tar: "💎 Тарифы", help: "🆘 Помощь", gift: "🎁 Ежедневный подарок", profile: "👤 Кабинет", show: "🎬 Примеры", back: "← НАЗАД", spin: "КРУТИТЬ", luck: "Beast Luck", wait: "Ждите 24 часа!" },
            en: { limit: "Video Limit", unit: "min.", try: "CREATE VIDEO", stats: "📊 Stats", ref: "👥 Refs", tar: "💎 Plans", help: "🆘 Help", gift: "🎁 Daily Gift", profile: "👤 Profile", show: "🎬 Showcase", back: "← BACK", spin: "SPIN", luck: "Beast Luck", wait: "Wait 24h!" },
            am: { limit: "Վիդեո սահմանաչափ", unit: "րոպե", try: "ՍՏԵՂԾԵԼ ՎԻԴԵՈ", stats: "📊 Վիճակագրություն", ref: "👥 Ռեֆերալներ", tar: "💎 Սակագներ", help: "🆘 Օգնություն", gift: "🎁 Նվեր", profile: "👤 Կաբինետ", show: "🎬 Օրինակներ", back: "← ՀԵՏ", spin: "ՊՏՏԵԼ", luck: "Beast Luck", wait: "Սպասեք 24 ժամ" }
            // Аналогично добавляются остальные языки
        };

        function changeLanguage(lang) {
            const t = i18n[lang] || i18n['en'];
            document.getElementById('label-status').innerText = t.limit;
            document.getElementById('unit-text').innerText = t.unit;
            document.getElementById('btn-try').innerText = t.try;
            document.getElementById('item-stats').innerText = t.stats;
            document.getElementById('item-ref').innerText = t.ref;
            document.getElementById('item-tariffs').innerText = t.tar;
            document.getElementById('item-help').innerText = t.help;
            document.getElementById('item-gift').innerText = t.gift;
            document.getElementById('item-profile').innerText = t.profile;
            document.getElementById('item-showcase').innerText = t.show;
            document.getElementById('btn-back').innerText = t.back;
            document.getElementById('spin-button').innerText = t.spin;
            document.getElementById('g-title').innerText = t.luck;
        }

        function drawWheel() {
            const ctx = document.getElementById('wheel-canvas').getContext('2d');
            const arc = (Math.PI * 2) / prizes.length;
            ctx.clearRect(0,0,600,600);
            prizes.forEach((p, i) => {
                ctx.beginPath(); ctx.fillStyle = p.c; ctx.moveTo(300, 300);
                ctx.arc(300, 300, 300, i * arc, (i + 1) * arc); ctx.fill();
                ctx.save(); ctx.translate(300, 300); ctx.rotate(i * arc + arc/2);
                ctx.fillStyle = "white"; ctx.font = "bold 50px sans-serif"; ctx.textAlign = "right";
                ctx.fillText(p.n, 280, 15); ctx.restore();
            });
        }

        function runWheel() {
            const last = localStorage.getItem('beast_last_spin');
            if (last && (Date.now() - last < 86400000)) {
                tg.showAlert("Access denied: 24h limit"); return;
            }
            const canvas = document.getElementById('wheel-canvas');
            const idx = Math.floor(Math.random() * prizes.length);
            const totalDeg = 3600 + (idx * (360 / prizes.length));
            canvas.style.transform = `rotate(${totalDeg}deg)`;
            setTimeout(() => {
                const prize = prizes[prizes.length - 1 - (idx % prizes.length)];
                userPlan.balance += prize.v;
                userPlan.updateDisplay();
                localStorage.setItem('beast_last_spin', Date.now());
                tg.showAlert(`Win: +${prize.n} min`);
            }, 4100);
        }

        function openGiftModal() { document.getElementById('gift-modal').style.display = 'flex'; drawWheel(); }
        function closeGiftModal() { document.getElementById('gift-modal').style.display = 'none'; }

        window.onload = () => {
            const user = tg.initDataUnsafe?.user;
            if(user) document.getElementById('user-name').innerText = user.first_name.toUpperCase();
            changeLanguage('ru');
        };
    </script>
</body>
</html>
