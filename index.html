<style>
    :root {
        --bg-total: #000000;
        --bg-surface: #050505;
        --bg-card: #121214;
        --text-main: #ffffff;
        --text-dim: #a1a1a6;
        --accent-blue: #007aff;
        --accent-gradient: linear-gradient(135deg, #007aff 0%, #0040ff 100%);
        --border-soft: rgba(255, 255, 255, 0.06);
        --nav-height: 85px;
    }

    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

    body {
        background-color: var(--bg-total);
        color: var(--text-main);
        font-family: 'Inter', sans-serif; /* Основной чистый шрифт */
        margin: 0; padding: 0;
        overflow-x: hidden;
        -webkit-user-select: none;
        padding-bottom: calc(var(--nav-height) + 40px);
    }

    /* --- SPLASH SCREEN (Deep Black) --- */
    #splash-screen {
        position: fixed; inset: 0;
        background: #000000; /* Чистый черный как ты просил */
        z-index: 10000; display: flex; flex-direction: column; align-items: center; justify-content: center;
        transition: opacity 0.5s ease;
    }
    #splash-logo { 
        font-family: 'Montserrat'; font-weight: 900; font-size: 42px; color: #fff; 
        letter-spacing: -1px; margin-bottom: 25px; text-transform: uppercase;
    }
    .progress-bar { width: 240px; height: 4px; background: rgba(255,255,255,0.1); border-radius: 10px; overflow: hidden; }
    .progress-fill { height: 100%; width: 0%; background: var(--accent-blue); animation: fillProgress 2.5s ease-in-out forwards; }
    @keyframes fillProgress { to { width: 100%; } }

    /* --- HEADER --- */
    .header {
        padding: 50px 20px 20px; display: flex; justify-content: space-between; align-items: center;
        background: rgba(0,0,0,0.85); backdrop-filter: blur(20px);
        position: fixed; top: 0; width: 100%; z-index: 1000; border-bottom: 1px solid var(--border-soft);
    }
    .header h1 { font-family: 'Montserrat'; font-weight: 900; font-size: 24px; margin: 0; }
    #lang-select { 
        background: #1a1a1a; color: #fff; border: 1px solid var(--border-soft); 
        padding: 8px 12px; border-radius: 12px; font-weight: 700; font-family: 'Montserrat'; 
    }

    /* --- CONTENT --- */
    .feed { padding: 130px 20px 20px; }
    
    .main-video-card {
        width: 100%; height: 420px; border-radius: 30px; overflow: hidden; position: relative;
        margin-bottom: 25px; border: 1px solid var(--border-soft);
    }
    .main-video-card video { width: 100%; height: 100%; object-fit: cover; opacity: 0.7; }
    .video-label { 
        position: absolute; bottom: 25px; left: 25px; font-family: 'Montserrat'; 
        font-weight: 900; font-size: 20px; text-transform: uppercase; 
    }

    .btn-main-action {
        background: var(--accent-gradient); color: #fff; border: none; width: 100%;
        padding: 22px; border-radius: 24px; font-family: 'Montserrat'; font-weight: 900;
        font-size: 16px; text-transform: uppercase; cursor: pointer; transition: 0.2s;
    }
    .btn-main-action:active { transform: scale(0.97); }

    /* --- INFO BLOCKS --- */
    .info-block { margin-bottom: 50px; }
    .info-text b { 
        display: block; font-family: 'Montserrat'; font-weight: 900; font-size: 26px;
        margin-bottom: 15px; color: #fff; text-transform: uppercase;
    }
    .info-text span { font-size: 15px; color: var(--text-dim); line-height: 1.7; display: block; }
    .info-text strong { color: var(--accent-blue); }
    .info-img { width: 100%; border-radius: 28px; margin-top: 20px; border: 1px solid var(--border-soft); }

    /* --- PACKAGES --- */
    .package-item { 
        background: var(--bg-card); border: 1px solid var(--border-soft); 
        border-radius: 22px; padding: 20px; margin-bottom: 12px; 
    }
    .package-header { display: flex; justify-content: space-between; font-family: 'Montserrat'; font-weight: 900; margin-bottom: 10px; }
    .package-name { color: var(--accent-blue); font-size: 17px; }
    .package-price { font-size: 19px; }
    .package-features { font-size: 13px; color: var(--text-dim); line-height: 1.5; }

    /* --- SUPPORT --- */
    .beast-card {
        background: linear-gradient(180deg, #111, #000); border: 1px solid var(--accent-blue);
        padding: 25px; border-radius: 30px; text-align: center;
    }
    .beast-card b { font-family: 'Montserrat'; font-weight: 900; font-size: 18px; color: #fff; }
    .beast-card p { font-size: 13px; color: var(--text-dim); margin: 15px 0; line-height: 1.5; }
    .btn-support {
        background: #fff; color: #000; border: none; width: 100%; padding: 18px;
        border-radius: 18px; font-family: 'Montserrat'; font-weight: 900; text-transform: uppercase;
    }

    /* --- TAB BAR (Glass Style) --- */
    .tab-bar {
        position: fixed; bottom: 0; left: 0; width: 100%; height: var(--nav-height);
        background: rgba(10, 10, 10, 0.9); backdrop-filter: blur(25px);
        border-top: 1px solid var(--border-soft); display: flex; justify-content: space-around;
        align-items: center; padding-bottom: 25px; z-index: 2000;
    }
    .nav-item {
        color: var(--text-dim); text-decoration: none; font-family: 'Montserrat';
        font-weight: 900; font-size: 10px; text-transform: uppercase; letter-spacing: 1px;
    }
    .nav-item.active { color: var(--accent-blue); }

    /* --- MODAL --- */
    #gift-modal { 
        display: none; position: fixed; inset: 0; background: #000; z-index: 9999;
        flex-direction: column; align-items: center; justify-content: center; padding: 20px;
    }
    #gift-modal h2 { font-family: 'Montserrat'; font-weight: 900; font-size: 32px; margin-bottom: 30px; }
    .back-btn { margin-top: 30px; color: var(--text-dim); font-family: 'Montserrat'; font-weight: 900; cursor: pointer; text-transform: uppercase; }
</style>

    const prizes = [{n:"0.1",c:"#121212"},{n:"0.5",c:"#1a1a1a"},{n:"0.1",c:"#121212"},{n:"1.0",c:"#007aff"},{n:"0.1",c:"#121212"},{n:"2.0",c:"#1a1a1a"},{n:"0.1",c:"#121212"},{n:"0.0",c:"#000"}];
    
    function drawWheel() { 
        const ctx = document.getElementById('wheel-canvas').getContext('2d'); 
        ctx.clearRect(0,0,600,600); 
        prizes.forEach((p, i) => { 
            ctx.beginPath(); ctx.fillStyle = p.c; ctx.moveTo(300, 300); 
            ctx.arc(300, 300, 300, i*(Math.PI/4), (i+1)*(Math.PI/4)); ctx.fill();
            ctx.save(); ctx.translate(300,300); ctx.rotate(i*(Math.PI/4)+Math.PI/8);
            ctx.fillStyle="#fff"; ctx.font="900 46px Montserrat"; ctx.textAlign="right";
            ctx.fillText(p.n, 280, 15); ctx.restore(); 
        }); 
    }

    function runWheel() { 
        const canvas = document.getElementById('wheel-canvas'); 
        const idx = Math.floor(Math.random()*prizes.length); 
        canvas.style.transform = `rotate(${3600+(idx*45)}deg)`; 
        setTimeout(() => { tg.showAlert("Jackpot Win!"); }, 4600); 
    }

    function closeGiftModal() { document.getElementById('gift-modal').style.display='none'; }
