<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Beast Omni Ultimate</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            background-color: #f8fafc;
            color: #1e293b;
            font-family: -apple-system, system-ui, sans-serif;
            margin: 0; padding: 0;
            overflow-x: hidden;
            -webkit-user-select: none;
        }

        /* ВЫБОР ЯЗЫКА */
        .lang-container {
            position: absolute;
            top: 25px;
            right: 20px;
            z-index: 100;
        }
        
        #lang-select {
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(20px);
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.3);
            padding: 10px 16px;
            border-radius: 16px;
            font-size: 14px;
            font-weight: 700;
            outline: none;
        }

        /* ГИГАНТСКОЕ ВИДЕО СВЕРХУ */
        .video-banner {
            position: relative;
            width: 100%;
            height: 50vh; 
            background: #000;
            overflow: hidden;
        }

        .video-banner video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            opacity: 0.85;
        }

        .video-overlay {
            position: absolute;
            bottom: 65px;
            left: 25px;
            color: white;
            z-index: 2;
        }

        .video-overlay h1 {
            margin: 0;
            font-size: 42px;
            font-weight: 950;
            text-transform: uppercase;
            letter-spacing: -1px;
            line-height: 1;
        }

        .main-content {
            position: relative;
            background: #f8fafc;
            border-radius: 40px 40px 0 0;
            padding: 30px 25px;
            margin-top: -50px;
            box-sizing: border-box;
            min-height: 55vh;
            box-shadow: 0 -20px 40px rgba(0,0,0,0.1);
        }

        /* КАРТОЧКА ТАРИФА */
        .status-card {
            background: white;
            padding: 24px;
            border-radius: 30px;
            box-shadow: 0 15px 45px rgba(0,0,0,0.05);
            margin-bottom: 25px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 1px solid rgba(37, 99, 235, 0.1);
        }

        .status-value {
            font-size: 28px;
            font-weight: 900;
            color: #1e293b;
        }

        .status-value span { color: #2563eb; }

        .badge-plan {
            background: linear-gradient(135deg, #2563eb, #1d4ed8);
            color: white;
            padding: 12px 20px;
            border-radius: 18px;
            font-size: 14px;
            font-weight: 900;
        }

        /* КНОПКИ */
        .btn-action {
            background: #2563eb;
            color: white;
            border: none;
            width: 100%;
            padding: 24px;
            border-radius: 26px;
            font-size: 19px;
            font-weight: 800;
            margin-bottom: 25px;
            box-shadow: 0 15px 35px rgba(37, 99, 235, 0.35);
        }

        .menu-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .menu-item {
            background: white;
            padding: 24px 15px;
            border-radius: 28px;
            text-align: center;
            font-weight: 700;
            font-size: 15px;
            box-shadow: 0 8px 25px rgba(0,0,0,0.03);
        }

        .item-gift {
            grid-column: span 2;
            background: linear-gradient(135deg, #eff6ff 0%, #dbeafe 100%);
            border: 2px solid #2563eb;
            color: #2563eb;
            font-weight: 800;
        }

        /* МОДАЛКА РУЛЕТКИ */
        #gift-modal {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: white;
            z-index: 5000;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 30px;
        }

        #wheel-canvas {
            width: 320px;
            height: 320px;
            transition: transform 4s cubic-bezier(0.1, 0, 0.1, 1);
        }
    </style>
</head>
<body>

    <div class="lang-container">
        <select id="lang-select" onchange="changeLanguage(this.value)">
            <option value="ru">🇷🇺 RU</option>
            <option value="en">🇺🇸 EN</option>
            <option value="am">🇦🇲 AM</option>
            <option value="es">🇪🇸 ES</option>
            <option value="fr">🇫🇷 FR</option>
            <option value="kz">🇰🇿 KZ</option>
            <option value="zh">🇨🇳 ZH</option>
            <option value="pl">🇵🇱 PL</option>
            <option value="cz">🇨🇿 CZ</option>
            <option value="ua">🇺🇦 UA</option>
        </select>
    </div>

    <div class="video-banner">
        <video autoplay muted loop playsinline><source src="https://www.w3schools.com/howto/rain.mp4" type="video/mp4"></video>
        <div class="video-overlay">
            <h1 id="user-name">GORO</h1>
            <div id="sub-title" style="font-size: 16px; opacity: 0.9; font-weight: 600;">Beast Omni Global</div>
        </div>
    </div>

    <div class="main-content">
        <div class="status-card">
            <div class="status-info">
                <div id="label-status" style="font-size:12px; font-weight:800; color:#64748b; text-transform:uppercase;">Лимит видео</div>
                <div class="status-value"><span id="limit-val">4</span> <small id="unit-text" style="font-size: 16px;">мин.</small></div>
            </div>
            <div id="plan-badge" class="badge-plan">PREMIUM</div>
        </div>

        <button id="btn-try" class="btn-action">СОЗДАТЬ ВИДЕО</button>

        <div class="menu-grid">
            <div id="item-stats" class="menu-item">📊 Статистика</div>
            <div id="item-ref" class="menu-item">👥 Рефералы</div>
            <div id="item-tariffs" class="menu-item">💎 Тарифы</div>
            <div id="item-help" class="menu-item">🆘 Помощь</div>
            <div id="item-gift" class="menu-item item-gift" onclick="openGiftModal()">🎁 Ежедневный подарок</div>
            <div id="item-profile" class="menu-item" style="color:#475569;">👤 Кабинет</div>
            <div id="item-showcase" class="menu-item" style="color:#475569;">🎬 Примеры</div>
        </div>
    </div>

    <div id="gift-modal">
        <h2 id="g-title" style="font-size: 32px; font-weight: 950; color:#1e293b; margin:0;">Удача Beast</h2>
        <p id="timer-info" style="color:#64748b; font-weight:600; margin-bottom:20px;">Крути и получай бонусы!</p>
        <canvas id="wheel-canvas" width="600" height="600"></canvas>
        <button id="spin-button" class="btn-action" style="max-width:300px; margin-top:30px;" onclick="runWheel()">КРУТИТЬ</button>
        <div id="btn-back" style="margin-top:20px; color:#2563eb; font-weight:800; cursor:pointer;" onclick="closeGiftModal()">← ВЕРНУТЬСЯ</div>
    </div>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand();

        // ТВОЯ ЛОГИКА ТАРИФОВ
        const userPlan = {
            price: 15, // Здесь будет цена из БД
            getLimit: function() {
                if (this.price >= 100) return "∞";
                if (this.price >= 50) return "8";
                if (this.price >= 30) return "6";
                if (this.price >= 15) return "4";
                if (this.price >= 5) return "2";
                return "0.5";
            },
            getBadge: function() {
                if (this.price >= 100) return "ULTRA";
                if (this.price >= 30) return "PRO";
                if (this.price >= 5) return "BASIC";
                return "FREE";
            }
        };

        const prizes = [
            { n: "0.1", c: "#6366f1", v: 0.1 }, { n: "0.5", c: "#3b82f6", v: 0.5 },
            { n: "0.1", c: "#6366f1", v: 0.1 }, { n: "1.0", c: "#2563eb", v: 1.0 },
            { n: "0.1", c: "#6366f1", v: 0.1 }, { n: "2.0", c: "#1e40af", v: 2.0 },
            { n: "0.1", c: "#6366f1", v: 0.1 }, { n: "0.0", c: "#94a3b8", v: 0 }
        ];

        const i18n = {
            ru: { limit: "Лимит видео", unit: "мин.", unlim: "Безлимит", try: "СОЗДАТЬ ВИДЕО", stats: "📊 Статистика", ref: "👥 Рефералы", tar: "💎 Тарифы", help: "🆘 Помощь", gift: "🎁 Ежедневный подарок", profile: "👤 Кабинет", show: "🎬 Примеры", back: "← ВЕРНУТЬСЯ", spin: "КРУТИТЬ", luck: "Крути и получай бонусы!" },
            en: { limit: "Video Limit", unit: "min.", unlim: "Unlimited", try: "CREATE VIDEO", stats: "📊 Stats", ref: "👥 Refs", tar: "💎 Plans", help: "🆘 Help", gift: "🎁 Daily Gift", profile: "👤 Profile", show: "🎬 Showcase", back: "← GO BACK", spin: "SPIN", luck: "Spin and win bonuses!" },
            am: { limit: "Վիդեո սահմանաչափ", unit: "րոպե", unlim: "Անսահմանափակ", try: "ՍՏԵՂԾԵԼ ՎԻԴԵՈ", stats: "📊 Վիճակագրություն", ref: "👥 Ռեֆերալներ", tar: "💎 Սակագներ", help: "🆘 Օգնություն", gift: "🎁 Օրական նվեր", profile: "👤 Կաբինետ", show: "🎬 Օրինակներ", back: "← ՀԵՏ", spin: "ՊՏՏԵԼ", luck: "Պտտիր և շահիր" },
            es: { limit: "Límite de video", unit: "min.", unlim: "Ilimitado", try: "CREAR VIDEO", stats: "📊 Estadísticas", ref: "👥 Referidos", tar: "💎 Tarifas", help: "🆘 Ayuda", gift: "🎁 Regalo", profile: "👤 Perfil", show: "🎬 Ejemplos", back: "← VOLVER", spin: "GIRAR", luck: "¡Gira y gana!" },
            kz: { limit: "Видео шегі", unit: "мин.", unlim: "Шексіз", try: "ВИДЕО ЖАСАУ", stats: "📊 Статистика", ref: "👥 Рефералдар", tar: "💎 Тарифтер", help: "🆘 Көмек", gift: "🎁 Сыйлық", profile: "👤 Кабинет", show: "🎬 Мысалдар", back: "← ҚАЙТУ", spin: "АЙНАЛДЫРУ", luck: "Айналдырып, ұтып ал!" },
            ua: { limit: "Ліміт відео", unit: "хв.", unlim: "Безліміт", try: "СТВОРИТИ ВІДЕО", stats: "📊 Статистика", ref: "👥 Реферали", tar: "💎 Тарифи", help: "🆘 Допомога", gift: "🎁 Подарунок", profile: "👤 Кабінет", show: "🎬 Приклади", back: "← НАЗАД", spin: "КРУТИТИ", luck: "Крути та вигравай!" },
            fr: { limit: "Limite vidéo", unit: "min.", unlim: "Illimité", try: "CRÉER VIDÉO", stats: "📊 Stats", ref: "👥 Parrainage", tar: "💎 Tarifs", help: "🆘 Aide", gift: "🎁 Cadeau", profile: "👤 Profil", show: "🎬 Exemples", back: "← RETOUR", spin: "TOURNER", luck: "Tournez et gagnez !" },
            zh: { limit: "视频限制", unit: "分钟", unlim: "无限", try: "创建视频", stats: "📊 统计", ref: "👥 推荐", tar: "💎 资费", help: "🆘 帮助", gift: "🎁 礼物", profile: "👤 账户", show: "🎬 案例", back: "← 返回", spin: "旋转", luck: "旋转赢取奖励！" },
            pl: { limit: "Limit wideo", unit: "min.", unlim: "Limit", try: "STWÓRZ WIDEO", stats: "📊 Statystyki", ref: "👥 Polecenia", tar: "💎 Plany", help: "🆘 Pomoc", gift: "🎁 Prezent", profile: "👤 Profil", show: "🎬 Przykłady", back: "← POWRÓT", spin: "KRĘĆ", luck: "Kręć i wygrywaj!" },
            cz: { limit: "Limit videa", unit: "min.", unlim: "Neomezeně", try: "VYTVOŘIT VIDEO", stats: "📊 Statistiky", ref: "👥 Reference", tar: "💎 Tarify", help: "🆘 Pomoc", gift: "🎁 Dárek", profile: "👤 Profil", show: "🎬 Ukázky", back: "← ZPĚT", spin: "TOČIT", luck: "Toč a vyhrávej!" }
        };

        function changeLanguage(lang) {
            const t = i18n[lang] || i18n['ru'];
            document.getElementById('label-status').innerText = t.limit;
            document.getElementById('unit-text').innerText = t.unit;
            document.getElementById('btn-try').innerText = t.try;
            document.getElementById('item-stats').innerText = t.stats;
            document.getElementById('item-ref').innerText = t.ref;
            document.getElementById('item-tariffs').innerText = t.tar;
            document.getElementById('item-help').innerText = t.help;
            document.getElementById('item-gift').innerText = t.gift;
            document.getElementById('item-profile').innerText = t.profile;
            document.getElementById('item-showcase').innerText = t.show;
            document.getElementById('btn-back').innerText = t.back;
            document.getElementById('spin-button').innerText = t.spin;
            document.getElementById('timer-info').innerText = t.luck;
            
            const limit = userPlan.getLimit();
            document.getElementById('limit-val').innerText = (limit === "∞" ? t.unlim : limit);
            document.getElementById('unit-text').style.display = (limit === "∞" ? 'none' : 'inline');
            document.getElementById('plan-badge').innerText = userPlan.getBadge();
        }

        function drawWheel() {
            const canvas = document.getElementById('wheel-canvas');
            const ctx = canvas.getContext('2d');
            const arc = (Math.PI * 2) / prizes.length;
            prizes.forEach((p, i) => {
                ctx.beginPath(); ctx.fillStyle = p.c; ctx.moveTo(300, 300);
                ctx.arc(300, 300, 300, i * arc, (i + 1) * arc); ctx.fill();
                ctx.save(); ctx.translate(300, 300); ctx.rotate(i * arc + arc/2);
                ctx.fillStyle = "white"; ctx.font = "bold 50px sans-serif";
                ctx.fillText(p.n, 160, 20); ctx.restore();
            });
        }

        function runWheel() {
            const btn = document.getElementById('spin-button');
            btn.disabled = true;
            const randomPrizeIndex = Math.floor(Math.random() * prizes.length);
            const totalDeg = 3600 + (randomPrizeIndex * (360 / prizes.length));
            document.getElementById('wheel-canvas').style.transform = `rotate(${totalDeg}deg)`;
            setTimeout(() => {
                const prize = prizes[prizes.length - 1 - randomPrizeIndex];
                tg.showAlert(prize.v > 0 ? `🎉 +${prize.n}!` : "Try again!");
                btn.disabled = false;
            }, 4100);
        }

        function openGiftModal() { document.getElementById('gift-modal').style.display = 'flex'; drawWheel(); }
        function closeGiftModal() { document.getElementById('gift-modal').style.display = 'none'; }

        const user = tg.initDataUnsafe?.user;
        if(user) document.getElementById('user-name').innerText = user.first_name.toUpperCase();
        
        changeLanguage('ru');
        tg.ready();
    </script>
</body>
</html>
