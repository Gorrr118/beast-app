<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Beast Omni Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;900&display=swap" rel="stylesheet">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            /* Палитра True Black Modern */
            --bg-total: #000000;
            --bg-surface: #121212;
            --bg-card: #1c1c1e;
            --text-main: #ffffff;
            --text-dim: #8e8e93;
            --accent-blue: #007aff;
            --accent-gradient: linear-gradient(135deg, #007aff 0%, #0040ff 100%);
            --border-soft: rgba(255, 255, 255, 0.08);
            --nav-height: 70px;
        }

        body {
            background-color: var(--bg-total);
            color: var(--text-main);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            margin: 0; padding: 0;
            overflow-x: hidden; -webkit-user-select: none;
            padding-bottom: calc(var(--nav-height) + 30px); /* Место под навигацию */
        }

        /* --- НОВАЯ СЕКЦИЯ: ЗАСТАВКА (SPLASH SCREEN) --- */
        #splash-screen {
            position: fixed; inset: 0;
            background: radial-gradient(circle at center, #1b3a24 0%, #000000 100%); /* Зеленый градиент как в BEGY */
            z-index: 10000;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            opacity: 1; transition: opacity 0.5s ease;
        }

        #splash-logo {
            font-size: 42px; font-weight: 900; text-transform: uppercase;
            color: #fff; letter-spacing: -1px; margin-bottom: 30px;
            font-family: 'Poppins', sans-serif;
        }

        .progress-bar {
            width: 70%; max-width: 250px; height: 4px;
            background: rgba(255, 255, 255, 0.1); border-radius: 2px; overflow: hidden;
        }

        .progress-fill {
            height: 100%; width: 0%;
            background: var(--accent-blue);
            animation: fillProgress 3s forwards;
        }

        @keyframes fillProgress {
            0% { width: 0%; }
            100% { width: 100%; }
        }

        /* HEADER */
        .header {
            padding: 40px 20px 20px;
            display: flex; justify-content: space-between; align-items: flex-end;
            background: linear-gradient(to bottom, #000 60%, transparent);
            position: fixed; top: 0; width: 100%; z-index: 100; box-sizing: border-box;
        }

        .header h1 { margin: 0; font-size: 30px; font-weight: 800; letter-spacing: -1px; }

        /* LANG SELECT */
        #lang-select {
            background: var(--bg-surface); color: white; border: 1px solid var(--border-soft);
            padding: 8px 12px; border-radius: 12px; font-size: 13px; font-weight: 600; outline: none;
        }

        /* BANNER */
        .hero {
            position: relative; width: 100%; height: 35vh; background: #000; overflow: hidden;
            margin-top: 80px; /* Чтобы не заходить под хедер */
        }
        .hero video { width: 100%; height: 100%; object-fit: cover; opacity: 0.6; }
        .hero::after {
            content: ''; position: absolute; bottom: 0; width: 100%; height: 70%;
            background: linear-gradient(to top, var(--bg-total), transparent);
        }

        /* MAIN CONTENT */
        .main-content { padding: 0 20px; margin-top: -30px; position: relative; z-index: 10; }

        .status-card {
            background: var(--bg-card); border: 1px solid var(--border-soft);
            border-radius: 20px; padding: 20px; margin-bottom: 20px;
            display: flex; justify-content: space-between; align-items: center;
        }

        .stat-label { font-size: 13px; font-weight: 600; color: var(--text-dim); text-transform: uppercase; }
        .stat-value { font-size: 32px; font-weight: 800; color: var(--text-main); }
        .stat-value span { color: var(--accent-blue); font-size: 16px; opacity: 0.7; }

        .badge {
            background: rgba(0, 122, 255, 0.1); color: var(--accent-blue);
            padding: 6px 12px; border-radius: 10px; font-size: 11px; font-weight: 800; text-transform: uppercase;
        }

        /* CREATE BUTTON */
        .btn-create {
            background: var(--accent-gradient); color: white; border: none;
            width: 100%; padding: 20px; border-radius: 18px;
            font-size: 16px; font-weight: 700; margin-bottom: 20px;
            box-shadow: 0 8px 16px rgba(0, 122, 255, 0.15);
            transition: transform 0.1s; cursor: pointer;
        }
        .btn-create:active { transform: scale(0.97); opacity: 0.9; }

        /* BOTTOM NAV BAR (TAB BAR) - ТОЧЬ-В-ТОЧЬ КАК НА РЕФЕРЕНСЕ */
        .tab-bar {
            position: fixed; bottom: 0; left: 0; width: 100%; height: var(--nav-height);
            background: rgba(20, 20, 20, 0.95); backdrop-filter: blur(20px);
            border-top: 1px solid var(--border-soft);
            display: grid; grid-template-columns: repeat(5, 1fr);
            justify-items: center; align-items: center;
            padding-bottom: 15px; /* Для айфонов */
            z-index: 1000;
        }

        .nav-item {
            display: flex; flex-direction: column; align-items: center;
            color: var(--text-dim); font-size: 10px; font-weight: 600;
            text-transform: uppercase; text-decoration: none;
            transition: color 0.2s;
        }

        .nav-item.active { color: var(--accent-blue); }
        .nav-item span { font-size: 22px; margin-bottom: 3px; }

        /* MODAL */
        #gift-modal {
            display: none; position: fixed; inset: 0;
            background: var(--bg-total); z-index: 5000;
            flex-direction: column; align-items: center; justify-content: center; padding: 20px;
        }

        .wheel-container { position: relative; width: 300px; height: 300px; margin: 30px 0; }
        #wheel-canvas { width: 100%; height: 100%; border-radius: 50%; border: 4px solid var(--bg-card); transition: transform 4s cubic-bezier(0.1, 0, 0, 1); }
        .wheel-pointer {
            position: absolute; top: -15px; left: 50%; transform: translateX(-50%);
            width: 2px; height: 35px; background: #ff3b30; z-index: 100;
        }
    </style>
</head>
<body>

    <div id="splash-screen">
        <div id="splash-logo">BEAST OMNI</div>
        <div class="progress-bar">
            <div class="progress-fill"></div>
        </div>
    </div>

    <div class="header">
        <h1 id="user-name">BEAST</h1>
        <select id="lang-select" onchange="changeLanguage(this.value)">
            <option value="ru">🇷🇺 RU</option>
            <option value="en" selected>🇺🇸 EN</option>
            <option value="am">🇦🇲 AM</option>
        </select>
    </div>

    <div class="hero">
        <video autoplay muted loop playsinline><source src="https://www.w3schools.com/howto/rain.mp4" type="video/mp4"></video>
    </div>

    <div class="main-content">
        <div class="status-card">
            <div>
                <div class="stat-label" id="l-limit">Лимит видео</div>
                <div class="stat-value" id="limit-val">0.5 <span>мин.</span></div>
            </div>
            <div class="badge" id="plan-badge">FREE</div>
        </div>

        <button class="btn-create" id="l-create">СОЗДАТЬ ВИДЕО</button>
    </div>

    <div class="tab-bar">
        <a href="#" class="nav-item active"><span>📊</span><span id="tab-stats">Stats</span></a>
        <a href="#" class="nav-item"><span>👥</span><span id="tab-refs">Refs</span></a>
        <a href="#" class="nav-item"><span>💎</span><span id="tab-plans">Plans</span></a>
        <a href="#" class="nav-item" onclick="openGiftModal()"><span>🎁</span><span id="tab-gift">Gift</span></a>
        <a href="#" class="nav-item"><span>👤</span><span id="tab-profile">User</span></a>
    </div>

    <div id="gift-modal">
        <h2 style="font-size: 28px; font-weight: 800; color:var(--text-main); margin:0;" id="l-lucky">Beast Luck</h2>
        <div class="wheel-container">
            <div class="wheel-pointer"></div>
            <canvas id="wheel-canvas" width="600" height="600"></canvas>
        </div>
        <button class="btn-create" style="max-width: 280px;" onclick="runWheel()" id="l-spin">КРУТИТЬ</button>
        <div style="margin-top: 20px; color: var(--text-dim); font-weight: 700; cursor: pointer;" onclick="closeGiftModal()" id="l-back">← НАЗАД</div>
    </div>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand();
        tg.headerColor = "#000000";

        // ЛОГИКА ИСЧЕЗНОВЕНИЯ ЗАСТАВКИ
        window.addEventListener('load', () => {
            setTimeout(() => {
                const splash = document.getElementById('splash-screen');
                splash.style.opacity = '0';
                setTimeout(() => {
                    splash.style.display = 'none';
                }, 500);
            }, 3000); // 3 секунды на анимацию полосы
        });

        let userPlan = { balance: 0.5 };
        const prizes = [
            {n: "0.1", c: "#121212", v: 0.1}, {n: "0.5", c: "#1a1a1a", v: 0.5},
            {n: "0.1", c: "#121212", v: 0.1}, {n: "1.0", c: "#007aff", v: 1.0},
            {n: "0.1", c: "#121212", v: 0.1}, {n: "2.0", c: "#1a1a1a", v: 2.0},
            {n: "0.1", c: "#121212", v: 0.1}, {n: "0.0", c: "#000000", v: 0}
        ];

        const i18n = {
            ru: { limit: "Лимит видео", unit: "мин.", create: "СОЗДАТЬ ВИДЕО", t_stats: "Статы", t_refs: "Рефы", t_plans: "Plans", t_gift: "Gift", t_profile: "User", spin: "КРУТИТЬ", back: "← НАЗАД", lucky: "Beast Luck" },
            en: { limit: "Video Limit", unit: "min.", create: "CREATE VIDEO", t_stats: "Stats", t_refs: "Refs", t_plans: "Plans", t_gift: "Gift", t_profile: "User", spin: "SPIN", back: "← BACK", lucky: "Beast Luck" }
        };

        function changeLanguage(lang) {
            const t = i18n[lang] || i18n.en;
            document.getElementById('l-limit').innerText = t.limit;
            document.getElementById('l-create').innerText = t.create;
            document.getElementById('tab-stats').innerText = t.t_stats;
            document.getElementById('tab-refs').innerText = t.t_refs;
            document.getElementById('l-spin').innerText = t.spin;
            document.getElementById('l-back').innerText = t.back;
            document.getElementById('l-lucky').innerText = t.lucky;
        }

        function drawWheel() {
            const ctx = document.getElementById('wheel-canvas').getContext('2d');
            ctx.clearRect(0,0,600,600);
            prizes.forEach((p, i) => {
                ctx.beginPath(); ctx.fillStyle = p.c; ctx.moveTo(300, 300); ctx.arc(300, 300, 300, i * (Math.PI/4), (i+1) * (Math.PI/4)); ctx.fill();
                ctx.save(); ctx.translate(300, 300); ctx.rotate(i * (Math.PI/4) + (Math.PI/8));
                ctx.fillStyle = "#fff"; ctx.font = "bold 46px sans-serif"; ctx.textAlign = "right"; ctx.fillText(p.n, 280, 15); ctx.restore();
            });
        }

        function runWheel() {
            const last = localStorage.getItem('spin_true_black');
            if (last && (Date.now() - last < 86400000)) { tg.showAlert("24h cooldown."); return; }
            const canvas = document.getElementById('wheel-canvas');
            const idx = Math.floor(Math.random() * prizes.length);
            canvas.style.transform = `rotate(${3600 + (idx * 45)}deg)`;
            setTimeout(() => {
                const win = prizes[prizes.length - 1 - (idx % prizes.length)];
                userPlan.balance += win.v;
                document.getElementById('limit-val').innerHTML = `${userPlan.balance.toFixed(1)} <span>мин.</span>`;
                localStorage.setItem('spin_true_black', Date.now());
                tg.showAlert(`+${win.n} min`);
            }, 4100);
        }

        function openGiftModal() { document.getElementById('gift-modal').style.display = 'flex'; drawWheel(); }
        function closeGiftModal() { document.getElementById('gift-modal').style.display = 'none'; }

        window.onload = () => {
            if(tg.initDataUnsafe?.user) document.getElementById('user-name').innerText = tg.initDataUnsafe.user.first_name.toUpperCase();
            changeLanguage('en');
        };
    </script>
</body>
</html>
