<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Beast Omni Ultimate</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;900&display=swap" rel="stylesheet">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            background-color: #0d1117;
            color: #e6edf3;
            font-family: 'Poppins', -apple-system, system-ui, sans-serif;
            margin: 0; padding: 0;
            overflow-x: hidden;
            -webkit-user-select: none;
            padding-bottom: 90px; /* Место под навигацию */
        }

        /* LANG SELECT С ЭФФЕКТАМИ СТЕКЛА */
        .lang-container {
            position: absolute; top: 25px; right: 20px; z-index: 100;
        }
        
        #lang-select {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(20px);
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 10px 16px;
            border-radius: 16px;
            font-size: 14px; font-weight: 700;
            outline: none;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }

        /* ГИГАНТСКОЕ ВИДЕО С ГРАДИЕНТОМ */
        .video-banner {
            position: relative; width: 100%; height: 50vh; background: #000; overflow: hidden;
        }

        .video-banner video {
            width: 100%; height: 100%; object-fit: cover; opacity: 0.8;
        }

        .video-banner::after {
            content: ''; position: absolute; bottom: 0; left: 0; width: 100%; height: 40%;
            background: linear-gradient(to top, #0d1117, transparent); z-index: 1;
        }

        .video-overlay {
            position: absolute; bottom: 65px; left: 25px; color: white; z-index: 2;
        }

        .video-overlay h1 {
            margin: 0; font-size: 42px; font-weight: 950; text-transform: uppercase;
            letter-spacing: -1px; line-height: 1; text-shadow: 0 0 20px rgba(37, 99, 235, 0.6);
        }

        .main-content {
            position: relative;
            background: rgba(255, 255, 255, 0.03); 
            backdrop-filter: blur(15px);
            border-radius: 40px 40px 0 0;
            padding: 30px 25px; margin-top: -50px;
            box-sizing: border-box; min-height: 55vh;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 0 -20px 40px rgba(0,0,0,0.4);
            z-index: 5;
        }

        /* КАРТОЧКА ТАРИФА */
        .status-card {
            background: rgba(255, 255, 255, 0.05);
            padding: 24px; border-radius: 30px;
            margin-bottom: 25px; display: flex;
            justify-content: space-between; align-items: center;
            border: 1px solid rgba(37, 99, 235, 0.2);
            box-shadow: inset 0 0 15px rgba(255,255,255,0.05), 0 10px 20px rgba(0,0,0,0.2);
        }

        .status-value { font-size: 28px; font-weight: 900; color: #fff; }
        .status-value span { color: #3b82f6; text-shadow: 0 0 10px rgba(59, 130, 246, 0.5); }

        #plan-badge {
            background: linear-gradient(135deg, #2563eb, #1d4ed8);
            color: white; padding: 12px 20px; border-radius: 18px;
            font-size: 14px; font-weight: 900; box-shadow: 0 0 15px rgba(37, 99, 235, 0.4);
            text-transform: uppercase;
        }

        /* КНОПКИ */
        .btn-action {
            background: linear-gradient(135deg, #2563eb 0%, #1d4ed8 100%);
            color: white; border: none; width: 100%; padding: 24px;
            border-radius: 26px; font-size: 19px; font-weight: 800;
            margin-bottom: 25px;
            box-shadow: 0 15px 35px rgba(37, 99, 235, 0.35), inset 0 2px 4px rgba(255,255,255,0.3);
            transition: all 0.2s; cursor: pointer;
        }
        .btn-action:active { transform: scale(0.97); }

        /* TELEGRAM MINI APP TAB BAR */
        .telegram-tabs {
            position: fixed; bottom: 0; left: 0; width: 100%; height: 75px;
            background: rgba(13, 17, 23, 0.95); backdrop-filter: blur(20px);
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            display: grid; grid-template-columns: repeat(5, 1fr);
            justify-items: center; align-items: center;
            padding-bottom: 15px; /* Для iPhone */
            z-index: 1000;
        }

        .tab-item {
            text-decoration: none; color: #8b949e;
            font-size: 11px; font-weight: 600; text-transform: uppercase;
            display: flex; flex-direction: column; align-items: center;
            transition: all 0.2s;
        }

        .tab-item.active { color: #3b82f6; }
        .tab-item span { font-size: 24px; margin-bottom: 4px; }

        /* МОДАЛКА РУЛЕТКИ */
        #gift-modal {
            display: none; position: fixed; top: 0; left: 0;
            width: 100%; height: 100%; background: #0d1117;
            z-index: 9000; flex-direction: column;
            align-items: center; justify-content: center; padding: 30px;
        }

        .wheel-container { 
            position: relative; width: 320px; height: 320px; 
            margin: 20px 0; display: flex; justify-content: center; align-items: center;
        }
        #wheel-canvas { width: 100%; height: 100%; transition: transform 4s cubic-bezier(0.1, 0, 0, 1); }
        .wheel-pointer { position: absolute; top: -15px; left: 50%; transform: translateX(-50%); width: 0; height: 0; border-left: 15px solid transparent; border-right: 15px solid transparent; border-top: 30px solid #ef4444; z-index: 10; }
    </style>
</head>
<body>

    <div class="lang-container">
        <select id="lang-select" onchange="changeLanguage(this.value)">
            <option value="en">🇺🇸 EN</option><option value="ru" selected>🇷🇺 RU</option><option value="am">🇦🇲 AM</option>
            <option value="es">🇪🇸 ES</option><option value="fr">🇫🇷 FR</option><option value="de">🇩🇪 DE</option>
            <option value="it">🇮🇹 IT</option><option value="pt">🇵🇹 PT</option><option value="tr">🇹🇷 TR</option>
            <option value="kz">🇰🇿 KZ</option><option value="ua">🇺🇦 UA</option><option value="zh">🇨🇳 ZH</option>
            <option value="ja">🇯🇵 JA</option><option value="ko">🇰🇷 KO</option><option value="pl">🇵🇱 PL</option>
            <option value="cz">🇨🇿 CZ</option><option value="hi">🇮🇳 HI</option><option value="ar">🇸🇦 AR</option>
            <option value="nl">🇳🇱 NL</option><option value="sv">🇸🇪 SV</option><option value="no">🇳🇴 NO</option>
            <option value="da">🇩🇰 DA</option><option value="fi">🇫🇮 FI</option><option value="cs">🇨🇿 CS</option>
            <option value="hu">🇭🇺 HU</option><option value="ro">🇷🇴 RO</option><option value="bg">🇧🇬 BG</option>
            <option value="el">🇬🇷 EL</option><option value="he">🇮🇱 HE</option><option value="th">🇹🇭 TH</option>
            <option value="vi">🇻🇳 VI</option><option value="id">🇮🇩 ID</option><option value="ms">🇲🇾 MS</option>
            <option value="fa">🇮🇷 FA</option><option value="ka">🇬🇪 KA</option><option value="az">🇦🇿 AZ</option>
            <option value="uz">🇺🇿 UZ</option><option value="sr">🇷🇸 SR</option><option value="sk">🇸🇰 SK</option>
            <option value="lt">🇱🇹 LT</option>
        </select>
    </div>

    <div class="video-banner">
        <video autoplay muted loop playsinline><source src="https://www.w3schools.com/howto/rain.mp4" type="video/mp4"></video>
        <div class="video-overlay">
            <h1 id="user-name">BEAST</h1>
            <div id="sub-title" style="font-size: 16px; opacity: 0.8; font-weight: 600;">Beast Omni Global</div>
        </div>
    </div>

    <div class="main-content">
        <div class="status-card">
            <div class="status-info">
                <div id="label-status" style="font-size:12px; font-weight:800; color:#8b949e; text-transform:uppercase;">Лимит видео</div>
                <div class="status-value"><span id="limit-val">0.5</span> <small id="unit-text" style="font-size: 16px; color:#8b949e;">мин.</small></div>
            </div>
            <div id="plan-badge">FREE</div>
        </div>

        <button id="btn-try" class="btn-action">СОЗДАТЬ ВИДЕО</button>
    </div>

    <div class="telegram-tabs">
        <a href="#" class="tab-item active"><span id="t-icon-stats">📊</span><span id="t-label-stats">Статы</span></a>
        <a href="#" class="tab-item"><span id="t-icon-refs">👥</span><span id="t-label-refs">Рефы</span></a>
        <a href="#" class="tab-item"><span id="t-icon-tariffs">💎</span><span id="t-label-tariffs">Тарифы</span></a>
        <a href="#" class="tab-item" onclick="openGiftModal()"><span id="t-icon-gift">🎁</span><span id="t-label-gift">Подарок</span></a>
        <a href="#" class="tab-item"><span id="t-icon-profile">👤</span><span id="t-label-profile">Кабинет</span></a>
    </div>

    <div id="gift-modal">
        <h2 id="g-title" style="font-size: 32px; font-weight: 950; color:#fff; margin:0; text-align:center;">Beast Luck</h2>
        <div class="wheel-container">
            <div class="wheel-pointer"></div>
            <canvas id="wheel-canvas" width="600" height="600"></canvas>
        </div>
        <button id="spin-button" class="btn-action" style="max-width:300px;" onclick="runWheel()">КРУТИТЬ</button>
        <div id="btn-back" style="margin-top:20px; color:#3b82f6; font-weight:800; cursor:pointer;" onclick="closeGiftModal()">← НАЗАД</div>
    </div>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand();
        tg.headerColor = '#0d1117';
        tg.backgroundColor = '#0d1117';

        let userPlan = { balance: 0.5 };
        const prizes = [
            { n: "0.1", c: "#121212", v: 0.1 }, { n: "0.5", c: "#3b82f6", v: 0.5 },
            { n: "0.1", c: "#1a1a1a", v: 0.1 }, { n: "1.0", c: "#2563eb", v: 1.0 },
            { n: "0.1", c: "#121212", v: 0.1 }, { n: "2.0", c: "#1e40af", v: 2.0 },
            { n: "0.1", c: "#1a1a1a", v: 0.1 }, { n: "0.0", c: "#4b5563", v: 0 }
        ];

        const i18n = {
            ru: { limit: "Лимит видео", unit: "мин.", unlim: "Безлимит", try: "СОЗДАТЬ ВИДЕО", t_stats: "Статы", t_refs: "Рефы", t_tariffs: "Тарифы", t_gift: "Подарок", t_profile: "Кабинет", back: "← НАЗАД", spin: "КРУТИТЬ", lucky: "Beast Luck" },
            en: { limit: "Video Limit", unit: "min.", unlim: "Unlimited", try: "CREATE VIDEO", t_stats: "Stats", t_refs: "Refs", t_tariffs: "Plans", t_gift: "Gift", t_profile: "User", spin: "SPIN", back: "← BACK", lucky: "Beast Luck" },
            am: { limit: "Վիդեո սահմանաչափ", unit: "րոպե", unlim: "Անսահմանափակ", try: "ՍՏԵՂԾԵԼ ՎԻԴԵՈ", t_stats: "Ստատներ", t_refs: "Ռեֆերներ", t_tariffs: "Սակագներ", t_gift: "Նվեր", t_profile: "Կաբինետ", back: "← ՀԵՏ", spin: "ՊՏՏԵԼ", lucky: "Beast Luck" }
        };

        function changeLanguage(lang) {
            const t = i18n[lang] || i18n['en'];
            document.getElementById('label-status').innerText = t.limit;
            document.getElementById('unit-text').innerText = t.unit;
            document.getElementById('btn-try').innerText = t.try;
            document.getElementById('t-label-stats').innerText = t.t_stats;
            document.getElementById('t-label-refs').innerText = t.t_refs;
            document.getElementById('t-label-tariffs').innerText = t.t_tariffs;
            document.getElementById('t-label-gift').innerText = t.t_gift;
            document.getElementById('t-label-profile').innerText = t.t_profile;
            document.getElementById('btn-back').innerText = t.back;
            document.getElementById('spin-button').innerText = t.spin;
            document.getElementById('g-title').innerText = t.lucky;
        }

        function drawWheel() {
            const ctx = document.getElementById('wheel-canvas').getContext('2d');
            const arc = (Math.PI * 2) / prizes.length;
            ctx.clearRect(0,0,600,600);
            prizes.forEach((p, i) => {
                ctx.beginPath(); ctx.fillStyle = p.c; ctx.moveTo(300, 300);
                ctx.arc(300, 300, 300, i * arc, (i + 1) * arc); ctx.fill();
                ctx.save(); ctx.translate(300, 300); ctx.rotate(i * arc + arc/2);
                ctx.fillStyle = "white"; ctx.font = "bold 50px sans-serif"; ctx.textAlign = "right";
                ctx.fillText(p.n, 280, 15); ctx.restore();
            });
        }

        function runWheel() {
            const last = localStorage.getItem('beast_spin_v1');
            const now = Date.now();
            if (last && (now - last < 86400000)) {
                tg.showAlert("Access denied: 24h cooldown."); return;
            }
            const canvas = document.getElementById('wheel-canvas');
            const idx = Math.floor(Math.random() * prizes.length);
            const totalDeg = 3600 + (idx * (360 / prizes.length));
            canvas.style.transform = `rotate(${totalDeg}deg)`;
            setTimeout(() => {
                const win = prizes[prizes.length - 1 - (idx % prizes.length)];
                if(win.v > 0) {
                    userPlan.balance += win.v;
                    document.getElementById('limit-val').innerHTML = `${userPlan.balance.toFixed(1)} <small id="unit-text">мин.</small>`;
                    tg.showAlert(`🎉 +${win.n} min!`);
                } else {
                    tg.showAlert("Try again tomorrow!");
                }
                localStorage.setItem('beast_spin_v1', Date.now());
            }, 4100);
        }

        function openGiftModal() { document.getElementById('gift-modal').style.display = 'flex'; drawWheel(); }
        function closeGiftModal() { document.getElementById('gift-modal').style.display = 'none'; }

        window.onload = () => {
            const user = tg.initDataUnsafe?.user;
            if(user) document.getElementById('user-name').innerText = user.first_name.toUpperCase();
            changeLanguage('ru');
        };
    </script>
</body>
</html>
