<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Beast Omni Ultimate</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --bg-color: #f2f2f7; /* Светло-серый фон как в iOS */
            --card-bg: #ffffff;
            --accent-blue: #007aff;
            --text-main: #1c1c1e;
            --text-secondary: #8e8e93;
            --border-color: #e5e5ea;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Inter', -apple-system, system-ui, sans-serif;
            margin: 0; padding: 0;
            overflow-x: hidden; -webkit-user-select: none;
        }

        /* LANG SELECT */
        .lang-container {
            position: absolute; top: 20px; right: 20px; z-index: 100;
        }
        
        #lang-select {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(10px);
            color: var(--text-main);
            border: 1px solid var(--border-color);
            padding: 8px 14px;
            border-radius: 12px;
            font-size: 13px; font-weight: 700;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }

        /* HEADER & BANNER */
        .video-banner {
            position: relative; width: 100%; height: 35vh; background: #fff; overflow: hidden;
        }

        .video-banner video {
            width: 100%; height: 100%; object-fit: cover;
        }

        .video-banner::after {
            content: ''; position: absolute; bottom: 0; width: 100%; height: 100%;
            background: linear-gradient(to bottom, transparent 60%, var(--bg-color));
        }

        .video-overlay {
            position: absolute; bottom: 50px; left: 25px; z-index: 2;
        }

        .video-overlay h1 {
            margin: 0; font-size: 38px; font-weight: 800; letter-spacing: -1px;
            color: var(--text-main); text-transform: uppercase;
        }

        /* MAIN CONTENT */
        .main-content {
            padding: 0 20px 40px; margin-top: -30px; position: relative; z-index: 5;
        }

        .status-card {
            background: var(--card-bg);
            padding: 20px; border-radius: 24px;
            margin-bottom: 20px; display: flex;
            justify-content: space-between; align-items: center;
            box-shadow: 0 10px 25px rgba(0,0,0,0.04);
            border: 1px solid var(--card-bg);
        }

        .status-label { font-size: 13px; font-weight: 700; color: var(--text-secondary); text-transform: uppercase; }
        .status-value { font-size: 28px; font-weight: 800; color: var(--text-main); }
        .status-value span { color: var(--accent-blue); }

        #plan-badge {
            background: #e1f0ff; color: var(--accent-blue);
            padding: 8px 16px; border-radius: 14px;
            font-size: 12px; font-weight: 800;
        }

        /* BUTTONS */
        .btn-action {
            background: var(--accent-blue);
            color: white; border: none; width: 100%; padding: 22px;
            border-radius: 20px; font-size: 17px; font-weight: 700;
            margin-bottom: 20px;
            box-shadow: 0 8px 20px rgba(0, 122, 255, 0.25);
            transition: all 0.2s; cursor: pointer;
        }
        .btn-action:active { transform: scale(0.97); opacity: 0.9; }

        .menu-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

        .menu-item {
            background: var(--card-bg);
            padding: 20px 10px; border-radius: 20px;
            text-align: center; font-weight: 700; font-size: 14px;
            color: var(--text-main); border: 1px solid var(--border-color);
            transition: all 0.2s; box-shadow: 0 4px 10px rgba(0,0,0,0.02);
        }
        .menu-item:active { background: #f9f9f9; transform: translateY(2px); }

        .item-gift {
            grid-column: span 2; background: #fff;
            border: 2px solid var(--accent-blue); color: var(--accent-blue);
        }

        /* MODAL */
        #gift-modal {
            display: none; position: fixed; inset: 0;
            background: var(--bg-color); z-index: 1000;
            flex-direction: column; align-items: center; justify-content: center; padding: 20px;
        }

        .wheel-container { position: relative; width: 300px; height: 300px; margin: 30px 0; }
        #wheel-canvas { width: 100%; height: 100%; border-radius: 50%; border: 6px solid #fff; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        .wheel-pointer { 
            position: absolute; top: -10px; left: 50%; transform: translateX(-50%); 
            width: 4px; height: 30px; background: #ff3b30; z-index: 10; border-radius: 2px;
        }
    </style>
</head>
<body>

    <div class="lang-container">
        <select id="lang-select" onchange="changeLanguage(this.value)">
            <option value="ru" selected>🇷🇺 Русский</option>
            <option value="en">🇺🇸 English</option>
            <option value="am">🇦🇲 Armenian</option>
            <option value="es">🇪🇸 Spanish</option>
            <option value="fr">🇫🇷 French</option>
            <option value="de">🇩🇪 German</option>
        </select>
    </div>

    <div class="video-banner">
        <video autoplay muted loop playsinline><source src="https://www.w3schools.com/howto/rain.mp4" type="video/mp4"></video>
        <div class="video-overlay">
            <h1 id="user-name">BEAST</h1>
            <div id="sub-title" style="font-size: 14px; color: var(--text-secondary); font-weight: 700; text-transform: uppercase;">Premium Interface</div>
        </div>
    </div>

    <div class="main-content">
        <div class="status-card">
            <div>
                <div id="label-status" class="status-label">Лимит видео</div>
                <div class="status-value"><span id="limit-val">0.5</span> <small style="font-size: 14px;" id="unit-text">мин.</small></div>
            </div>
            <div id="plan-badge">FREE PLAN</div>
        </div>

        <button id="btn-try" class="btn-action">СОЗДАТЬ ВИДЕО</button>

        <div class="menu-grid">
            <div id="item-stats" class="menu-item">📊 Статистика</div>
            <div id="item-ref" class="menu-item">👥 Рефералы</div>
            <div id="item-tariffs" class="menu-item">💎 Тарифы</div>
            <div id="item-help" class="menu-item">🆘 Помощь</div>
            <div id="item-gift" class="menu-item item-gift" onclick="openGiftModal()">🎁 Ежедневный подарок</div>
            <div id="item-profile" class="menu-item">👤 Кабинет</div>
            <div id="item-showcase" class="menu-item">🎬 Примеры</div>
        </div>
    </div>

    <div id="gift-modal">
        <h2 id="g-title" style="font-size: 32px; font-weight: 800; color: var(--text-main); margin: 0;">Beast Luck</h2>
        <div class="wheel-container">
            <div class="wheel-pointer"></div>
            <canvas id="wheel-canvas" width="600" height="600"></canvas>
        </div>
        <button id="spin-button" class="btn-action" style="max-width: 300px;" onclick="runWheel()">КРУТИТЬ</button>
        <div id="btn-back" style="margin-top: 20px; color: var(--accent-blue); font-weight: 700; cursor: pointer;" onclick="closeGiftModal()">← НАЗАД</div>
    </div>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand();
        tg.headerColor = "#f2f2f7";

        let userPlan = { balance: 0.5 };
        const prizes = [
            { n: "0.1", c: "#e5e5ea", v: 0.1 }, { n: "0.5", c: "#007aff", v: 0.5 },
            { n: "0.1", c: "#d1d1d6", v: 0.1 }, { n: "1.0", c: "#5856d6", v: 1.0 },
            { n: "0.1", c: "#e5e5ea", v: 0.1 }, { n: "2.0", c: "#34c759", v: 2.0 },
            { n: "0.1", c: "#d1d1d6", v: 0.1 }, { n: "0.0", c: "#8e8e93", v: 0 }
        ];

        const i18n = {
            ru: { limit: "Лимит видео", unit: "мин.", try: "СОЗДАТЬ ВИДЕО", stats: "📊 Статистика", ref: "👥 Рефералы", tar: "💎 Тарифы", help: "🆘 Помощь", gift: "🎁 Ежедневный подарок", profile: "👤 Кабинет", show: "🎬 Примеры", back: "← НАЗАД", spin: "КРУТИТЬ", luck: "Beast Luck" },
            en: { limit: "Video Limit", unit: "min.", try: "CREATE VIDEO", stats: "📊 Stats", ref: "👥 Refs", tar: "💎 Plans", help: "🆘 Help", gift: "🎁 Daily Gift", profile: "👤 Profile", show: "🎬 Showcase", back: "← BACK", spin: "SPIN", luck: "Beast Luck" }
        };

        function changeLanguage(lang) {
            const t = i18n[lang] || i18n['en'];
            document.getElementById('label-status').innerText = t.limit;
            document.getElementById('unit-text').innerText = t.unit;
            document.getElementById('btn-try').innerText = t.try;
            document.getElementById('item-stats').innerText = t.stats;
            document.getElementById('item-ref').innerText = t.ref;
            document.getElementById('item-tariffs').innerText = t.tar;
            document.getElementById('item-help').innerText = t.help;
            document.getElementById('item-gift').innerText = t.gift;
            document.getElementById('item-profile').innerText = t.profile;
            document.getElementById('item-showcase').innerText = t.show;
            document.getElementById('btn-back').innerText = t.back;
            document.getElementById('spin-button').innerText = t.spin;
            document.getElementById('g-title').innerText = t.luck;
        }

        function drawWheel() {
            const ctx = document.getElementById('wheel-canvas').getContext('2d');
            const arc = (Math.PI * 2) / prizes.length;
            ctx.clearRect(0,0,600,600);
            prizes.forEach((p, i) => {
                ctx.beginPath(); ctx.fillStyle = p.c; ctx.moveTo(300, 300);
                ctx.arc(300, 300, 300, i * arc, (i + 1) * arc); ctx.fill();
                ctx.save(); ctx.translate(300, 300); ctx.rotate(i * arc + arc/2);
                ctx.fillStyle = "white"; ctx.font = "bold 50px sans-serif"; ctx.textAlign = "right";
                ctx.fillText(p.n, 280, 15); ctx.restore();
            });
        }

        function runWheel() {
            const last = localStorage.getItem('beast_spin_v2');
            if (last && (Date.now() - last < 86400000)) {
                tg.showAlert("Доступно раз в 24 часа!"); return;
            }
            const canvas = document.getElementById('wheel-canvas');
            const idx = Math.floor(Math.random() * prizes.length);
            canvas.style.transform = `rotate(${3600 + (idx * 45)}deg)`;
            setTimeout(() => {
                const p = prizes[prizes.length - 1 - (idx % prizes.length)];
                userPlan.balance += p.v;
                document.getElementById('limit-val').innerText = userPlan.balance.toFixed(1);
                localStorage.setItem('beast_spin_v2', Date.now());
                tg.showAlert(`Вы выиграли: +${p.n} мин.`);
            }, 4100);
        }

        function openGiftModal() { document.getElementById('gift-modal').style.display = 'flex'; drawWheel(); }
        function closeGiftModal() { document.getElementById('gift-modal').style.display = 'none'; }

        window.onload = () => {
            const user = tg.initDataUnsafe?.user;
            if(user) document.getElementById('user-name').innerText = user.first_name.toUpperCase();
            changeLanguage('ru');
        };
    </script>
</body>
</html>
