<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Beast Omni Ultimate Elite</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Montserrat:wght@700;800;900&display=swap" rel="stylesheet">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>

    <div id="splash-screen">
        <div id="splash-logo">BEAST OMNI</div>
        <div class="progress-bar"><div class="progress-fill"></div></div>
    </div>

    <div class="header">
        <h1 id="user-name">BEAST CORE</h1>
        <select id="lang-select" onchange="changeLanguage(this.value)">
            <option value="ru" selected>🇷🇺 RU</option>
            <option value="en">🇺🇸 EN</option>
        </select>
    </div>

    <div id="app">
        
        <section id="screen-main" class="app-screen active">
            <div class="feed">
                <div class="main-video-card">
                    <video autoplay muted loop playsinline poster="https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe">
                        <source src="https://www.w3schools.com/howto/rain.mp4" type="video/mp4">
                    </video>
                    <div class="video-label" id="l-creation">ULTIMATE GENERATION 2.0</div>
                </div>

                <button class="btn-main-action" id="l-create-btn" onclick="tg.showAlert('Initializing Neural Core...')">ЗАПУСТИТЬ ТЕРМИНАЛ</button>

                <div class="info-block" style="margin-top:60px;">
                    <div class="info-text">
                        <b id="l-title-project">ЭКОСИСТЕМА BEAST OMNI</b>
                        <span id="l-desc-project"></span>
                    </div>
                    <img src="https://images.unsplash.com/photo-1614850523296-d8c1af93d400?q=80&w=1000" class="info-img">
                </div>

                <div class="info-block">
                    <div class="info-text"><b id="l-title-plans">ТАРИФНЫЕ ПЛАНЫ</b></div>
                    <div id="packages-container"></div>
                    <img src="https://images.unsplash.com/photo-1639762681485-074b7f938ba0?q=80&w=1000" class="info-img" style="margin-top:20px;">
                </div>

                <div class="info-block">
                    <div class="info-text">
                        <b id="l-title-sec">БЕЗОПАСНОСТЬ ДАННЫХ</b>
                        <span id="l-desc-sec"></span>
                    </div>
                    <img src="https://images.unsplash.com/photo-1550751827-4bd374c3f58b?q=80&w=1000" class="info-img">
                </div>

                <div class="info-block">
                    <div class="info-text">
                        <b id="l-title-pay">СПОСОБЫ ОПЛАТЫ</b>
                        <span id="l-desc-pay"></span>
                    </div>
                    <img src="https://images.unsplash.com/photo-1621416894569-0f39ed31d247?q=80&w=1000" class="info-img">
                </div>

                <div class="info-block">
                    <div class="beast-card">
                        <b id="l-title-supp">ЭЛИТНАЯ ПОДДЕРЖКА 24/7</b>
                        <p id="l-desc-supp"></p>
                        <button class="btn-support" id="l-btn-supp" onclick="tg.openTelegramLink('https://t.me/your_support_bot')">СВЯЗАТЬСЯ С ПОДДЕРЖКОЙ</button>
                    </div>
                </div>
            </div>
        </section>

        <section id="screen-ref" class="app-screen">
            <div class="feed"> <div class="ref-container">
                    <div class="ref-card-balance">
                        <p>Твой профит</p>
                        <h1 id="total-earnings">0.00 <span>STARS</span></h1>
                    </div>

                    <div class="ref-info-grid">
                        <div class="info-item">
                            <span id="friends-count">0</span>
                            <label>Друзей</label>
                        </div>
                        <div class="info-item">
                            <span id="conversion-rate">0%</span>
                            <label>Конверсия</label>
                        </div>
                    </div>

                    <div class="ref-link-wrapper">
                        <label>Реферальная ссылка</label>
                        <div class="input-group">
                            <input type="text" id="ref-url" value="https://t.me/beast_omni_bot?start=user123" readonly>
                            <button class="copy-btn" onclick="RefModule.copyLink()">Копировать</button>
                        </div>
                    </div>

                    <div class="milestones-list"></div>

                    <button class="btn-main-action" style="margin-top:20px;" onclick="RefModule.share()">
                        ПРИГЛАСИТЬ ПАРТНЕРОВ
                    </button>
                </div>
            </div>
        </section>

    </div>

    <div class="tab-bar">
        <a href="#" class="nav-item active" id="tab-home" onclick="Navigation.goTo('screen-main', this)">ГЛАВНАЯ</a>
        <a href="#" class="nav-item" id="tab-stats" onclick="Navigation.goTo('screen-stats', this)">СТАТЫ</a>
        <a href="#" class="nav-item" id="tab-refs" onclick="Navigation.goTo('screen-ref', this)">РЕФЫ</a>
        <a href="#" class="nav-item" id="tab-plans" onclick="Navigation.goTo('screen-main', this)">ТАРИФЫ</a>
        <a href="#" class="nav-item" id="tab-gift" onclick="openGiftModal()">БОНУС</a>
    </div>

    <div id="gift-modal">
        <h2 id="l-lucky">BEAST LUCK</h2>
        <div class="wheel-container">
            <div class="wheel-pointer"></div>
            <canvas id="wheel-canvas" width="600" height="600"></canvas>
        </div>
        <button class="btn-main-action" style="max-width: 280px;" onclick="runWheel()" id="l-spin">КРУТИТЬ КОЛЕСО</button>
        <div class="back-btn" onclick="closeGiftModal()" id="l-back">← НАЗАД</div>
    </div>

</body>
</html>
<style>
    :root {
        --bg-total: #000000;
        --bg-surface: #050505;
        --bg-card: #121214;
        --text-main: #ffffff;
        --text-dim: #a1a1a6;
        --accent-blue: #007aff;
        --accent-gradient: linear-gradient(135deg, #007aff 0%, #0040ff 100%);
        --border-soft: rgba(255, 255, 255, 0.06);
        --nav-height: 85px;
    }

    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

    body {
        background-color: var(--bg-total);
        color: var(--text-main);
        font-family: 'Inter', sans-serif;
        margin: 0; padding: 0;
        overflow-x: hidden;
        -webkit-user-select: none;
        padding-bottom: calc(var(--nav-height) + 40px);
    }

    /* Анимации */
    @keyframes fadeInUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes scaleIn { from { opacity: 0; transform: scale(0.9); } to { opacity: 1; transform: scale(1); } }
    @keyframes pulseBlue { 0% { box-shadow: 0 0 5px rgba(0, 122, 255, 0.2); } 50% { box-shadow: 0 0 20px rgba(0, 122, 255, 0.5); } 100% { box-shadow: 0 0 5px rgba(0, 122, 255, 0.2); } }

    /* Экраны */
    .app-screen { display: none; animation: scaleIn 0.4s ease; }
    .app-screen.active { display: block; }

    /* Splash */
    #splash-screen { position: fixed; inset: 0; background: #000; z-index: 10000; display: flex; flex-direction: column; align-items: center; justify-content: center; transition: opacity 0.5s ease; }
    #splash-logo { font-family: 'Montserrat'; font-weight: 900; font-size: 42px; color: #fff; text-transform: uppercase; text-shadow: 0 0 15px var(--accent-blue); }
    .progress-bar { width: 240px; height: 4px; background: rgba(255,255,255,0.1); border-radius: 10px; margin-top: 20px; overflow: hidden; }
    .progress-fill { height: 100%; width: 0%; background: var(--accent-blue); animation: fillProgress 2.5s ease-in-out forwards; }
    @keyframes fillProgress { to { width: 100%; } }

    /* Header */
    .header { padding: 45px 20px 15px; display: flex; justify-content: space-between; align-items: center; background: rgba(0, 0, 0, 0.9); backdrop-filter: blur(20px); position: fixed; top: 0; width: 100%; z-index: 1000; border-bottom: 1px solid var(--border-soft); }
    .header h1 { margin: 0; font-family: 'Montserrat'; font-weight: 900; font-size: 26px; text-transform: uppercase; }
    #lang-select { background: #1a1a1a; color: white; border: 1px solid var(--border-soft); padding: 10px; border-radius: 14px; font-weight: 800; }

    /* Content */
    .feed { padding: 130px 20px 20px; }
    .main-video-card { width: 100%; height: 420px; border-radius: 30px; overflow: hidden; position: relative; margin-bottom: 25px; border: 1px solid var(--border-soft); }
    .main-video-card video { width: 100%; height: 100%; object-fit: cover; opacity: 0.7; }
    .video-label { position: absolute; bottom: 25px; left: 25px; font-family: 'Montserrat'; font-weight: 900; font-size: 20px; }

    .btn-main-action { background: var(--accent-gradient); color: #fff; border: none; width: 100%; padding: 22px; border-radius: 24px; font-family: 'Montserrat'; font-weight: 900; text-transform: uppercase; cursor: pointer; }
    .btn-main-action:active { transform: scale(0.97); outline: 2px solid var(--accent-blue); }

    /* Info & Cards */
    .info-block { margin-bottom: 50px; }
    .info-text b { display: block; font-family: 'Montserrat'; font-weight: 900; font-size: 26px; margin-bottom: 15px; text-transform: uppercase; }
    .info-text span { font-size: 15px; color: var(--text-dim); line-height: 1.7; }
    .info-img { width: 100%; border-radius: 28px; margin-top: 20px; border: 1px solid var(--border-soft); }

    .package-item { background: var(--bg-card); border: 1px solid var(--border-soft); border-radius: 22px; padding: 20px; margin-bottom: 12px; }
    .package-name { color: var(--accent-blue); font-family: 'Montserrat'; font-weight: 900; }

    .beast-card { background: linear-gradient(180deg, #111, #000); border: 1px solid var(--accent-blue); padding: 25px; border-radius: 30px; text-align: center; animation: pulseBlue 3s infinite; }

    /* Referral Styles */
    .ref-card-balance { background: var(--bg-card); border: 1px solid var(--accent-blue); border-radius: 24px; padding: 30px; text-align: center; margin-bottom: 20px; }
    .ref-card-balance h1 { font-size: 32px; color: var(--accent-blue); margin: 10px 0 0; font-family: 'Montserrat'; font-weight: 900; }
    .ref-info-grid { display: flex; gap: 15px; margin-bottom: 20px; }
    .info-item { background: var(--bg-card); flex: 1; padding: 20px; border-radius: 20px; text-align: center; border: 1px solid var(--border-soft); }
    .info-item span { display: block; font-size: 22px; font-weight: 900; color: #fff; }
    .ref-link-wrapper { background: var(--bg-card); padding: 20px; border-radius: 20px; border: 1px solid var(--border-soft); }
    .input-group { display: flex; background: #000; border-radius: 12px; padding: 5px; margin-top: 10px; border: 1px solid #333; }
    #ref-url { background: none; border: none; color: var(--text-dim); flex: 1; padding: 10px; outline: none; }
    .copy-btn { background: var(--accent-blue); border: none; color: #fff; padding: 0 15px; border-radius: 10px; font-weight: 900; font-family: 'Montserrat'; }

    /* Tab Bar */
    .tab-bar { position: fixed; bottom: 0; left: 0; width: 100%; height: var(--nav-height); background: rgba(10, 10, 10, 0.9); backdrop-filter: blur(25px); border-top: 1px solid var(--border-soft); display: flex; justify-content: space-around; align-items: center; padding-bottom: 25px; z-index: 2000; }
    .nav-item { color: var(--text-dim); text-decoration: none; font-family: 'Montserrat'; font-weight: 900; font-size: 10px; text-transform: uppercase; }
    .nav-item.active { color: var(--accent-blue); }

    /* Modal Wheel */
    #gift-modal { display: none; position: fixed; inset: 0; background: #000; z-index: 9999; flex-direction: column; align-items: center; justify-content: center; }
    .wheel-container { position: relative; width: 300px; height: 300px; margin-bottom: 30px; }
    #wheel-canvas { width: 100%; height: 100%; transition: transform 4s cubic-bezier(0.15, 0, 0.15, 1); }
</style>

<script>
    let tg = window.Telegram.WebApp;
    tg.expand();

    // МОДУЛЬ НАВИГАЦИИ
    const Navigation = {
        goTo: function(screenId, element) {
            // Скрываем все экраны
            document.querySelectorAll('.app-screen').forEach(s => s.classList.remove('active'));
            // Показываем нужный
            const target = document.getElementById(screenId);
            if (target) target.classList.add('active');

            // Обновляем активную кнопку в таб-баре
            document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
            if (element) element.classList.add('active');

            // Вибрация
            if (tg.HapticFeedback) tg.HapticFeedback.impactOccurred('light');
        }
    };

    // МОДУЛЬ РЕФЕРАЛОВ
    const RefModule = {
        copyLink: function() {
            const link = document.getElementById('ref-url');
            link.select();
            document.execCommand('copy');
            const btn = document.querySelector('.copy-btn');
            btn.innerText = 'OK!';
            setTimeout(() => btn.innerText = 'Копировать', 2000);
            if (tg.HapticFeedback) tg.HapticFeedback.notificationOccurred('success');
        },
        share: function() {
            const url = document.getElementById('ref-url').value;
            const text = "Зацени Beast Omni! Тут можно переводить видео и добавлять 3D аватаров. Залетай:";
            tg.openTelegramLink(`https://t.me/share/url?url=${encodeURIComponent(url)}&text=${encodeURIComponent(text)}`);
        }
    };

    // ЛОКАЛИЗАЦИЯ (Твой текст без изменений)
    const i18n = {
        ru: {
            home: "ГЛАВНАЯ", stats: "СТАТЫ", refs: "РЕФЫ", tariffs: "ТАРИФЫ", gift: "БОНУС",
            creation: "ULTIMATE GENERATION 2.0", create_btn: "ЗАПУСТИТЬ ТЕРМИНАЛ",
            project_t: "ЭКОСИСТЕМА BEAST OMNI", plans_t: "ТАРИФНЫЕ ПЛАНЫ", sec_t: "БЕЗОПАСНОСТЬ ДАННЫХ", pay_t: "СПОСОБЫ ОПЛАТЫ",
            supp_t: "ЭЛИТНАЯ ПОДДЕРЖКА 24/7", supp_b: "СВЯЗАТЬСЯ С ПОДДЕРЖКОЙ", spin: "КРУТИТЬ КОЛЕСО", back: "← НАЗАД", lucky: "BEAST LUCK",
            desc_p: "<strong>Beast Omni</strong> — это не просто инструмент, это цифровая сингулярность...",
            desc_s: "Ваша приватность — наш главный приоритет...",
            desc_pay: "Для обеспечения полной анонимности...",
            desc_supp: "Наши инженеры мониторят систему 24/7...",
            plans: [
                {n:"STARTER", p:"$5", f:"• 5 экспресс-генераций"},
                {n:"STANDARD", p:"$15", f:"• 15 Full HD генераций"},
                {n:"ADVANCED", p:"$30", f:"• 40 Cinematic-сессий"},
                {n:"ELITE", p:"$50", f:"• 80 Ultra 2K качества"},
                {n:"ULTIMATE", p:"$100", f:"• ПОЛНЫЙ БЕЗЛИМИТ 24/7"}
            ]
        },
        en: { /* ... Твой английский перевод ... */ }
    };

    function changeLanguage(lang) {
        const t = i18n[lang];
        document.getElementById('tab-home').innerText = t.home;
        document.getElementById('tab-stats').innerText = t.stats;
        document.getElementById('tab-refs').innerText = t.refs;
        document.getElementById('tab-plans').innerText = t.tariffs;
        document.getElementById('tab-gift').innerText = t.gift;
        document.getElementById('l-creation').innerText = t.creation;
        document.getElementById('l-create-btn').innerText = t.create_btn;
        document.getElementById('l-title-project').innerText = t.project_t;
        document.getElementById('l-title-plans').innerText = t.plans_t;
        document.getElementById('l-title-sec').innerText = t.sec_t;
        document.getElementById('l-title-pay').innerText = t.pay_t;
        document.getElementById('l-title-supp').innerText = t.supp_t;
        document.getElementById('l-btn-supp').innerText = t.supp_b;
        document.getElementById('l-spin').innerText = t.spin;
        document.getElementById('l-back').innerText = t.back;
        document.getElementById('l-lucky').innerText = t.lucky;
        document.getElementById('l-desc-project').innerHTML = t.desc_p;
        document.getElementById('l-desc-sec').innerHTML = t.desc_s;
        document.getElementById('l-desc-pay').innerHTML = t.desc_pay;
        document.getElementById('l-desc-supp').innerHTML = t.desc_supp;

        const container = document.getElementById('packages-container');
        container.innerHTML = t.plans.map(p => `
            <div class="package-item" style="${p.n === 'ULTIMATE' ? 'border-color:var(--accent-blue)' : ''}">
                <div class="package-header"><span class="package-name">${p.n}</span><span class="package-price">${p.p}</span></div>
                <div class="package-features">${p.f}</div>
            </div>
        `).join('');
    }

    // КОЛЕСО УДАЧИ
    const prizes = [{n:"0.1",c:"#121212"},{n:"0.5",c:"#1a1a1a"},{n:"0.1",c:"#121212"},{n:"1.0",c:"#007aff"},{n:"0.1",c:"#121212"},{n:"2.0",c:"#1a1a1a"},{n:"0.1",c:"#121212"},{n:"0.0",c:"#000"}];
    function drawWheel() { 
        const ctx = document.getElementById('wheel-canvas').getContext('2d'); 
        ctx.clearRect(0,0,600,600); 
        prizes.forEach((p, i) => { 
            ctx.beginPath(); ctx.fillStyle = p.c; ctx.moveTo(300, 300); 
            ctx.arc(300, 300, 300, i*(Math.PI/4), (i+1)*(Math.PI/4)); ctx.fill();
            ctx.save(); ctx.translate(300,300); ctx.rotate(i*(Math.PI/4)+Math.PI/8);
            ctx.fillStyle="#fff"; ctx.font="900 46px Montserrat"; ctx.textAlign="right";
            ctx.fillText(p.n, 280, 15); ctx.restore(); 
        }); 
    }

    function runWheel() { 
        const canvas = document.getElementById('wheel-canvas'); 
        const idx = Math.floor(Math.random()*prizes.length); 
        canvas.style.transform = `rotate(${3600+(idx*45)}deg)`; 
        setTimeout(() => { tg.showAlert("Jackpot Win!"); }, 4600); 
    }

    function openGiftModal() { document.getElementById('gift-modal').style.display='flex'; drawWheel(); }
    function closeGiftModal() { document.getElementById('gift-modal').style.display='none'; }

    // ИНИЦИАЛИЗАЦИЯ
    window.onload = () => { 
        setTimeout(() => { 
            document.getElementById('splash-screen').style.opacity='0'; 
            setTimeout(()=>document.getElementById('splash-screen').style.display='none',500); 
        }, 2800);
        if(tg.initDataUnsafe?.user) document.getElementById('user-name').innerText = tg.initDataUnsafe.user.first_name.toUpperCase();
        changeLanguage('ru'); 
    };
</script>
